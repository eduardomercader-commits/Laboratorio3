apiVersion: v1
kind: Pod
metadata:
  name: debian-pod
  labels:
    app: debian
spec:
  hostAliases:
  - ip: "10.106.121.194"
    hostnames:
    - "ingress.local"
  containers:
    - name: debian-container
      # Use your exact local image name and tag
      image: my-debian-image:v1.0
      # Crucial: Stops Kubernetes from trying to download from Docker Hub
      imagePullPolicy: Never
    - name: herramientas
      image: alpine:3.23
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"
    - name: docker
      image: docker:latest
      command:
        - cat
      volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"
    - name: node
      image: node:24
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"
    - name: pnpm
      image: ghcr.io/pnpm/pnpm:11.1.2
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "2000m"
          memory: "1024Mi"
    - name: kubectl
      image: alpine/k8s:1.34.1
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"
    - name: buildkit
      image: moby/buildkit:rootless
      command:
        - cat
      tty: true
      volumeMounts:
        - name: regcred-dh
          mountPath: /docker-configs/dockerhub
          readOnly: true
        - name: regcred-gh
          mountPath: /docker-configs/github
          readOnly: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "6000m"
          memory: "1024Mi"
  volumes:
    - name: regcred-dh
      secret:
        secretName: regcred-dh
        items:
          - key: .dockerconfigjson
            path: config.json
    - name: regcred-gh
      secret:
        secretName: regcred-gh
        items:
          - key: .dockerconfigjson
            path: config.json
    - name: docker-socket
      hostPath:
        path: /var/run/docker.sock
